*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#333;display:flex;height:100vh;overflow:hidden;}

.sidebar{width:220px;min-width:220px;background:linear-gradient(180deg,#1a237e,#283593);color:#fff;padding:0;overflow-y:auto;flex-shrink:0;transition:transform .3s;}
.sidebar-header{padding:20px 16px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.15);}
.sidebar-header h1{font-size:18px;font-weight:700;letter-spacing:1px;}
.sidebar-header .sub{font-size:11px;opacity:.6;margin-top:4px;}
.nav-item{padding:12px 20px;cursor:pointer;transition:all .25s;border-left:3px solid transparent;font-size:14px;display:flex;align-items:center;gap:8px;}
.nav-item:hover{background:rgba(255,255,255,.1);}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:#ffd54f;}
.nav-item .badge{background:rgba(255,213,79,.9);color:#1a237e;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:auto;}
.nav-section{padding:8px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.4;}

.main{flex:1;overflow-y:auto;padding:24px 32px;}
.main-header{margin-bottom:20px;}
.main-header h2{font-size:26px;color:#1a237e;font-weight:700;}
.main-header .tips{background:#e8eaf6;border-radius:8px;padding:8px 14px;margin-top:8px;font-size:13px;color:#3949ab;}
.main-header .tips::before{content:"💡 ";}

.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;min-width:90px;}
.stat-card .num{font-size:28px;font-weight:700;color:#1a237e;}
.stat-card .label{font-size:11px;color:#666;margin-top:2px;}

.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #e0e0e0;flex-wrap:wrap;}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab:hover{color:#1a237e;}
.tab.active{color:#1a237e;border-bottom-color:#1a237e;}

.route-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);border-left:4px solid #1a237e;transition:all .25s;}
.route-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px);}
.route-card .route-name{font-size:16px;font-weight:700;color:#1a237e;margin-bottom:6px;}
.route-card .route-desc{font-size:13px;color:#666;margin-bottom:8px;}
.route-card .stops{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.route-card .stop{background:#e8eaf6;color:#1a237e;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.route-card .stop a{color:#3949ab;text-decoration:none;font-size:11px;margin-left:2px;}
.route-card .stop a:hover{text-decoration:underline;}
.route-card .stop-arrow{color:#999;padding:3px 2px;font-size:12px;}

.food-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04);display:flex;align-items:flex-start;gap:10px;}
.food-card .icon{font-size:20px;flex-shrink:0;}
.food-card .info{flex:1;min-width:0;}
.food-card .name{font-weight:600;color:#e65100;font-size:14px;}
.food-card .desc{font-size:12px;color:#777;margin-top:2px;}
.food-card .glink{flex-shrink:0;font-size:12px;color:#1a73e8;text-decoration:none;background:#e8f0fe;border-radius:6px;padding:4px 10px;white-space:nowrap;}
.food-card .glink:hover{background:#d2e3fc;}
.food-cat-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;margin-bottom:6px;position:sticky;top:48px;background:#fff;z-index:5;box-shadow:0 2px 4px rgba(0,0,0,.06);}
.food-cat-btn{border:1px solid #e0e0e0;border-radius:16px;padding:4px 12px;font-size:12px;background:#fff;color:#555;cursor:pointer;white-space:nowrap;}
.food-cat-btn:hover{background:#fff3e0;border-color:#ffb74d;}
.food-cat-btn.active{background:#e65100;color:#fff;border-color:#e65100;}
.food-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.food-tag{font-size:10px;background:#f5f5f5;color:#888;border-radius:4px;padding:1px 6px;}
.food-tag.popular{background:#fff3e0;color:#e65100;border:1px solid #ffb74d;}
.food-tag.michelin{background:#fff9c4;color:#b71c1c;border:1px solid #fbc02d;font-weight:600;}
.food-cat-btn.popular-filter{background:#ff6f00;color:#fff;border-color:#ff6f00;}
.food-cat-btn.michelin-filter{background:#b71c1c;color:#fff;border-color:#b71c1c;}

.stay-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04);border-left:3px solid #4caf50;display:flex;align-items:flex-start;gap:10px;}
.stay-card .stay-info{flex:1;min-width:0;}
.stay-card .name{font-weight:600;color:#2e7d32;font-size:14px;}
.stay-card .desc{font-size:12px;color:#777;margin-top:2px;}
.stay-card .glink{flex-shrink:0;font-size:12px;color:#1a73e8;text-decoration:none;background:#e8f0fe;border-radius:6px;padding:4px 10px;white-space:nowrap;}
.stay-card .glink:hover{background:#d2e3fc;}

.search-bar{width:100%;padding:10px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:16px;transition:border .2s;}
.search-bar:focus{outline:none;border-color:#1a237e;}

.gallery{margin-bottom:20px;}
.gallery-title{font-size:14px;font-weight:600;color:#1a237e;margin-bottom:10px;}
.gallery-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.gallery-scroll::-webkit-scrollbar{height:4px;}
.gallery-scroll::-webkit-scrollbar-thumb{background:#1a237e;border-radius:2px;}
.gallery-item{flex-shrink:0;width:280px;height:180px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s;}
.gallery-item:hover{transform:scale(1.03);}
.gallery-item img{width:100%;height:100%;object-fit:cover;}

.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:1001;background:#1a237e;color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:1000;transform:translateX(-100%);width:260px;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.3);}
  .main{padding:64px 16px 16px;}
  .hamburger{display:flex;align-items:center;justify-content:center;}
  .main-header h2{font-size:20px;}
  .stat-card{min-width:70px;padding:10px 14px;}
  .stat-card .num{font-size:22px;}
  .gallery-item{width:240px;height:160px;}
  .food-card{flex-wrap:wrap;}
  .food-card .glink{margin-top:4px;}
}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;}
.overlay.show{display:block;}

.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:2000;justify-content:center;align-items:center;cursor:pointer;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90%;max-height:90%;border-radius:12px;}

.area-group{margin-bottom:16px;}
.area-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.05);cursor:pointer;user-select:none;margin-bottom:8px;}
.area-header:hover{background:#f5f5f5;}
.area-arrow{color:#1a237e;font-size:14px;transition:transform .2s;}
.area-arrow.collapsed{transform:rotate(-90deg);}
.area-title{font-weight:700;color:#1a237e;font-size:15px;flex:1;}
.area-count{background:#e8eaf6;color:#1a237e;border-radius:10px;padding:2px 10px;font-size:12px;font-weight:600;}
.area-body{animation:fadeIn .3s ease;}
.area-body.collapsed{display:none;}
.food-card .rating{display:inline-flex;align-items:center;gap:4px;margin-left:8px;font-size:12px;}
.food-card .stars{color:#ffc107;letter-spacing:1px;}
.food-card .reviews{color:#999;font-size:11px;}

let currentCounty = '基隆';
let currentTab = 'routes';

function gmapLink(query, county){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query + ' ' + county)}`;
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function selectCounty(c){
  currentCounty = c;
  currentTab = 'routes';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const item = document.querySelector(`[data-county="${c}"]`);
  if(item){item.classList.add('active');}
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  render();
}

function selectTab(t){
  currentTab = t;
  render();
}

function showImage(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

function toggleArea(id){
  const body = document.getElementById(id);
  const arrow = document.getElementById('arrow-'+id);
  body.classList.toggle('collapsed');
  arrow.classList.toggle('collapsed');
}

function filterFood(btn, cat){
  // Toggle active button
  document.querySelectorAll('.food-cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Filter cards
  document.querySelectorAll('.food-card').forEach(card=>{
    const cats = (card.dataset.cats||'').split(',');
    if(!cat || cats.includes(cat)){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  // Hide empty area groups
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function filterPopular(btn){
  document.querySelectorAll('.food-cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.food-card').forEach(card=>{
    if(card.dataset.popular === '1'){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function filterMichelin(btn){
  document.querySelectorAll('.food-cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.food-card').forEach(card=>{
    if(card.dataset.michelin === '1'){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function render(){
  const d = DATA[currentCounty];
  const routes = d.routes||[];
  const food = d.food||[];
  const stay = d.stay||[];
  const tips = d.tips||'';
  const images = d.images||[];

  let galleryHtml = '';
  if(images.length){
    galleryHtml = `<div class="gallery">
      <div class="gallery-title">📸 ${currentCounty}景點照片</div>
      <div class="gallery-scroll">
        ${images.map(img=>`<div class="gallery-item" onclick="showImage('travel-images/${img}')"><img src="travel-images/${img}" loading="lazy"></div>`).join('')}
      </div>
    </div>`;
  }

  const html = `
    <div class="fade-in">
      <div class="main-header">
        <h2>${currentCounty}</h2>
        ${tips?`<div class="tips">${tips}</div>`:''}
      </div>
      ${galleryHtml}
      <input class="search-bar" placeholder="搜尋景點、美食..." oninput="filterSearch(this.value)">
      <div class="tabs">
        <div class="tab ${currentTab==='routes'?'active':''}" onclick="selectTab('routes')">🛣️ 路線 (${routes.length})</div>
        <div class="tab ${currentTab==='spots'?'active':''}" onclick="selectTab('spots')">📸 景點 (${(d.spots||[]).length})</div>
        <div class="tab ${currentTab==='indoor'?'active':''}" onclick="selectTab('indoor')">🏛️ 室內 (${(d.indoor||[]).length})</div>
        <div class="tab ${currentTab==='food'?'active':''}" onclick="selectTab('food')">🍜 美食 (${food.length})</div>
        <div class="tab ${currentTab==='souvenirs'?'active':''}" onclick="selectTab('souvenirs')">🏪 伴手禮 (${(d.souvenirs||[]).length})</div>
        <div class="tab ${currentTab==='stay'?'active':''}" onclick="selectTab('stay')">🏨 住宿 (${stay.length})</div>
      </div>
      <div id="tab-content">${renderTab(routes,food,stay,d.spots||[],d.indoor||[],d.souvenirs||[])}</div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

  if(currentTab==='routes'){
    if(!routes.length) return '<p style="color:#999;padding:20px;">尚無路線資料</p>';

      const stops = (r.stops||[]).map((s,j)=>{
        const arr = (r.stops||[]);
        const link = `<a href="${gmapLink(s,currentCounty)}" target="_blank" title="Google Maps 導航">📍</a>`;
        if(j<arr.length-1) return `<span class="stop">${s}${link}</span><span class="stop-arrow">→</span>`;

  let routes = d.routes||[], food = d.food||[], stay = d.stay||[], spots = d.spots||[], indoor = d.indoor||[], souvenirs = d.souvenirs||[];
  if(q){
    routes = routes.filter(r=>(r.name||'').toLowerCase().includes(q)||(r.stops||[]).join(' ').toLowerCase().includes(q));
    food = food.filter(f=>(f.name||'').toLowerCase().includes(q)||(f.description||'').toLowerCase().includes(q));
    stay = stay.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q));
    spots = spots.filter(s=>(s.name||'').toLowerCase().includes(q));
    indoor = indoor.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q));
    souvenirs = souvenirs.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q));
  }
  document.getElementById('tab-content').innerHTML = renderTab(routes,food,stay,spots,indoor,souvenirs);
}

ORDER.forEach(c=>{
  const d = DATA[c];
  const badge = document.getElementById('badge-'+c);
  if(badge){
    badge.textContent = (d.routes||[]).length;
  }
});
selectCounty('基隆');
</script>
