<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣一日遊全整理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#333;display:flex;height:100vh;overflow:hidden;}

.sidebar{width:220px;min-width:220px;background:linear-gradient(180deg,#1a237e,#283593);color:#fff;padding:0;overflow-y:auto;flex-shrink:0;transition:transform .3s;}
.sidebar-header{padding:20px 16px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.15);}
.sidebar-header h1{font-size:18px;font-weight:700;letter-spacing:1px;}
.sidebar-header .sub{font-size:11px;opacity:.6;margin-top:4px;}
.nav-item{padding:12px 20px;cursor:pointer;transition:all .25s;border-left:3px solid transparent;font-size:14px;display:flex;align-items:center;gap:8px;}
.nav-item:hover{background:rgba(255,255,255,.1);}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:#ffd54f;}
.nav-item .badge{background:rgba(255,213,79,.9);color:#1a237e;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;margin-left:auto;}
.nav-section{padding:8px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.4;}

.main{flex:1;overflow-y:auto;padding:24px 32px;}
.main-header{margin-bottom:20px;}
.main-header h2{font-size:26px;color:#1a237e;font-weight:700;}
.main-header .tips{background:#e8eaf6;border-radius:8px;padding:8px 14px;margin-top:8px;font-size:13px;color:#3949ab;}
.main-header .tips::before{content:"💡 ";}

.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{background:#fff;border-radius:12px;padding:14px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;min-width:90px;}
.stat-card .num{font-size:28px;font-weight:700;color:#1a237e;}
.stat-card .label{font-size:11px;color:#666;margin-top:2px;}

.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #e0e0e0;flex-wrap:wrap;}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab:hover{color:#1a237e;}
.tab.active{color:#1a237e;border-bottom-color:#1a237e;}

.route-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);border-left:4px solid #1a237e;transition:all .25s;cursor:pointer;}
.route-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px);}
.route-card .route-name{font-size:16px;font-weight:700;color:#1a237e;margin-bottom:6px;}
.route-card .route-desc{font-size:13px;color:#666;margin-bottom:8px;}
.route-card .stops{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.route-card .stop{background:#e8eaf6;color:#1a237e;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;}
.route-card .stop-arrow{color:#999;padding:3px 2px;font-size:12px;}

.food-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04);display:flex;align-items:flex-start;gap:10px;}
.food-card .icon{font-size:20px;flex-shrink:0;}
.food-card .info{flex:1;}
.food-card .name{font-weight:600;color:#e65100;font-size:14px;}
.food-card .desc{font-size:12px;color:#777;margin-top:2px;}

.stay-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04);border-left:3px solid #4caf50;}
.stay-card .name{font-weight:600;color:#2e7d32;font-size:14px;}
.stay-card .desc{font-size:12px;color:#777;margin-top:2px;}

.search-bar{width:100%;padding:10px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:16px;transition:border .2s;}
.search-bar:focus{outline:none;border-color:#1a237e;}

/* 圖片輪播 */
.gallery{margin-bottom:20px;}
.gallery-title{font-size:14px;font-weight:600;color:#1a237e;margin-bottom:10px;}
.gallery-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.gallery-scroll::-webkit-scrollbar{height:4px;}
.gallery-scroll::-webkit-scrollbar-thumb{background:#1a237e;border-radius:2px;}
.gallery-item{flex-shrink:0;width:280px;height:180px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s;}
.gallery-item:hover{transform:scale(1.03);}
.gallery-item img{width:100%;height:100%;object-fit:cover;}

.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:1001;background:#1a237e;color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:1000;transform:translateX(-100%);width:260px;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.3);}
  .main{padding:64px 16px 16px;}
  .hamburger{display:flex;align-items:center;justify-content:center;}
  .main-header h2{font-size:20px;}
  .stat-card{min-width:70px;padding:10px 14px;}
  .stat-card .num{font-size:22px;}
  .gallery-item{width:240px;height:160px;}
}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;}
.overlay.show{display:block;}

/* 圖片燈箱 */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:2000;justify-content:center;align-items:center;cursor:pointer;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90%;max-height:90%;border-radius:12px;}
</style>
</head>

</div>

<script>

2號"},{"name":"戴記扁食","description":"傳承90年歷史的經典扁食，遵循老曾祖父傳統古法手工製作，皮薄滑嫩肉香甜。已歇業但冷凍宅配仍可訂購，訂單排等約半年。"},{"name":"炸彈蔥油餅","description":"花蓮必吃小吃，炸得酥脆的蔥油餅加上半熟炸蛋，蛋汁爆漿口感絕佳，位於花蓮市區，常大排長龍。"},{"name":"公正街包子","description":"花蓮市區知名包子店，蒸籠現做包子皮Q餡多，是花蓮必吃的小吃之一，與扁食、蔥油餅並列花蓮三大必吃。"},{"name":"東大門夜市美食","description":"花蓮東大門夜市400家攤位精選，棺材板、烤玉米、濃郁果汁等一級美食，涵蓋自強夜市、原住民一條街、各省一條街、福町夜市四大區。"},{"name":"佳興冰果室","description":"新城老街旁的知名冰果室，招牌檸檬汁酸甜清爽，搭配七星潭、太魯閣一日遊順路必吃。"},{"name":"五餅二魚餐廳","description":"立川漁場內的特色餐廳，現炒黃金蜆、鹽烤台灣鯛、清蒸貴妃魚必點，用餐建議先訂位。"},{"name":"老牌炸蛋蔥油餅（藍車）","description":"1969年創業花蓮必吃，復興街藍色發財車，天天大排隊"},{"name":"炸彈蔥油餅（黃車）","description":"花蓮另家人氣蔥油餅，半熟蛋配酥脆餅皮，排隊名店"},{"name":"玉里麵（阿森麵店）","description":"玉里60年排隊老店，油蔥酥香玉里麵配黑白切"},{"name":"源寶屋咖哩麵包","description":"500碗推薦，全台首創日式咖哩麵包，天然發酵現炸金黃酥脆"},{"name":"鵝肉先生","description":"花蓮林森路40年老店，鮮嫩多汁鵝肉配特製沾醬，必訪知名小吃"},{"name":"大陸麵店","description":"吉安70年老字號麵店，傳統麵食傳承三代"},{"name":"西村的家食堂","description":"吉安鄉滷肉飯名店，半熟蛋配滷肉飯，台式黯然消魂飯"},{"name":"玉里橋頭臭豆腐","description":"玉里超人氣臭豆腐，酥脆外皮配上特製泡菜"},{"name":"娜滋滋烤魚","description":"原住民無菜單料理，整條烤魚配山蘇野菜，魯肉飯吃到飽"},{"name":"花蓮扁食","description":"花蓮特色扁食湯，薄皮大餡鮮肉，多間名店競爭"},{"name":"公正街包子店","description":"花蓮市區排隊包子店，蒸包子配酸辣湯，平價飽足"},{"name":"液香扁食","description":"花蓮老牌扁食店，皮薄餡鮮，蔣經國曾造訪"}],"stay":[{"name":"理想大地渡假飯店","description":"台灣唯一入選世界百大飯店的度假村，園區擁有2.2公里運河、萬坪綠地與西班牙式環河別墅，搭乘遊艇遊覽應許之河，住一晚比純入園更划算。"},{"name":"遠雄海洋公園周邊住宿","description":"壽豐鄉鹽寮村海景飯店群，依山面海能一邊玩設施一邊眺望太平洋，適合親子家庭。"},{"name":"花蓮市區飯店（東大門夜市周邊）","description":"住宿大本營首選，生活機能佳、近東大門夜市與文創園區，初訪花蓮建議以此為基地。波比推薦Top19花蓮住宿攻略精選。"},{"name":"七星潭海景民宿","description":"新城鄉七星潭周邊海景第一排民宿，月牙灣海景無敵，推薦Top7海景民宿，適合喜歡看日出聽海浪的旅客。"}],"tips":"花蓮景點分散、南北車程動輒1-2小時，強烈建議自駕或包車。若搭火車可鎖定花蓮市、新城（太魯閣）、瑞穗、玉里等大站周邊再轉乘租機車。台灣好行公車也是預算有限的選擇。太魯閣因0403地震多數步道重建中，前往前請先查官網開放狀況。花蓮地形南北狹長，分北花蓮（新城秀林花蓮市吉安壽豐）、花東縱谷（鳳林光復瑞穗玉里富里）、花蓮海岸（豐濱台11線）三大區塊規劃。8-9月金針花海季節限定，要提前訂房。","image_slides":[56],"images":[]},"台東":{"routes":[{"name":"台東縱谷線一日遊","stops":["台東市區","初鹿牧場","鹿野高台","關山親水公園","池上伯朗大道","天堂路"],"description":"縱谷線經典路線，初鹿牧場喝鮮奶、鹿野高台看熱氣球（夏季）、關山騎腳踏車、池上伯朗大道騎單車看稻田，是台東最有人氣的縱谷行程。"},{"name":"台東海岸線一日遊","stops":["台東市區","小野柳","加路蘭遊憩區","金樽遊憩區","東河包子","三仙台","石雨傘"],"description":"沿台11線海岸線北上，小野柳奇岩怪石、金樽海景、三仙台跨海拱橋，是台東最美海岸線路線。東河包子是必吃中繼站。"},{"name":"知本溫泉森林一日遊","stops":["台東市區","知本國家森林遊樂區","知本溫泉","鐵花村音樂聚落","台東觀光夜市"],"description":"知本是台灣四大溫泉之一，碳酸泉質清澈富含礦物質。上午森林浴、下午泡湯，晚上到鐵花村聽音樂、逛觀光夜市吃小吃。"},{"name":"太麻里金針花南迴一日遊","stops":["台東市區","多良車站","灌籃高手平交道","太麻里金針花季","知本國家森林遊樂區"],"description":"多良車站被譽為台灣最美車站，灌籃高手平交道拍照打卡，太麻里金針花季（8-9月）滿山金黃，下午順遊知本森林遊樂區。"},{"name":"台東市區慢活一日遊","stops":["臺東森林公園","琵琶湖","海濱公園","鐵花村","正氣路觀光夜市"],"description":"森林公園琵琶湖騎腳踏車、海濱公園看太平洋，下午鐵花村音樂聚落，晚上正氣路夜市吃林家臭豆腐、卑南包子、老東台米苔目。"},{"name":"阿朗壹古道南迴一日遊","stops":["台東市區","阿朗壹古道","金崙咖啡","南迴海岸線裝置藝術"],"description":"台東最南端古道海景，是台灣唯一天然海岸古道，需提前申請。搭配金崙黑手咖啡與南迴沿線裝置藝術，慢遊南迴最美海岸線。"}],"food":[{"name":"林家臭豆腐","description":"台東正氣路必吃小吃，酥酥脆脆的臭豆腐搭配九層塔，是台東最具代表性的排隊美食。地址：台東市正氣路130號，營業時間12:00起。"},{"name":"卑南包子","description":"台東卑南鄉知名包子店，高麗菜包、筍丁肉包都超人氣，尺寸大餡料實在，常下午就賣完。地址：台東市卑南里更生北路182號。"},{"name":"老東台米苔目","description":"台東經典米苔目老店，Q彈米苔目搭配清爽湯頭，是台東必吃的在地小吃，位於正氣路美食一級戰區。"},{"name":"卑南豬血湯","description":"卑南鄉飄香小吃，豬血口感脆彈與一般軟嫩不同，搭配大腸及蔥花，湯頭清香，是路過必停的在地美食。"},{"name":"東河包子","description":"東河鄉知名包子店，是海岸線旅遊必吃中繼站，肉包、菜包都受歡迎，常大排長龍。"},{"name":"正氣路觀光夜市","description":"台東觀光夜市（週四五六開），林家臭豆腐、阿鋐炸雞、台南阿明東山鴨頭、金雞母鹽水雞、寶桑豆花、卑南甕餅等一次滿足。"},{"name":"知本黑松羊肉爐","description":"知本溫泉區知名羊肉爐，泡完溫泉後吃羊肉爐是在地人最推薦的知本一日遊完美句點。"},{"name":"榕樹下米苔目","description":"中華路創始老店60年傳承，別無分店，米苔目Q彈湯頭鮮"},{"name":"香琪鴨肉","description":"三代老店鴨肉飯鴨肉麵，當歸湯真材實料，手工米血，太晚吃不到肉粽"},{"name":"陳記蔥油餅臭豆腐","description":"四維夜市人氣組合，蔥油餅配臭豆腐豬血湯"},{"name":"喜悅麵店","description":"太麻里20年老店，乾麵Q彈肉燥香，刈包五花肉滷製用心"},{"name":"原始部落山地美食","description":"卑南山腰原住民風味餐廳，傳統烤肉配山蘇，可看夜景"},{"name":"達瓦娜原味餐廳","description":"魯凱族無菜單料理，煙燻山豬肉刺蔥蛋獵人便當阿粨石頭火鍋"},{"name":"楊記搖搖地瓜酥","description":"台東伴手禮，鹹甜風味輕薄爽脆，搖搖梅子搖搖海鹽口味"},{"name":"台東正氣路豆花","description":"台東市區人氣豆花店，古早味豆花配花生粉粿"},{"name":"寶桑豆花","description":"台東老字號豆花，手工製作綿密滑嫩，配料豐富"},{"name":"藍蜻蜓炸雞","description":"台東超人氣炸雞速食，現炸多汁，皮脆肉嫩"}],"stay":[{"name":"台東知本溫泉飯店","description":"知本溫泉區沿知本溪建設的飯店民宿群，碳酸泉質清澈富含礦物質，有「東台第一景」美稱。適合泡湯兼住宿的度假行程。"},{"name":"台東市區飯店（鐵花村周邊）","description":"台東市區住宿首選，近鐵花村音樂聚落、正氣路夜市、臺東森林公園，生活機能佳，適合做為台東旅遊基地。"},{"name":"池上民宿","description":"池上伯朗大道周邊稻田景觀民宿，清晨看稻田晨霧、騎單車逛天堂路，是縱谷線最愜意的住宿選擇。"},{"name":"拾一 Begin Again 民宿","description":"jatraveling推薦的特色民宿，適合不想塞滿景點、只想找舒適民宿度過兩天一夜的慢活旅客。"}],"tips":"台東景點分散，分為縱谷山線（台9線）與濱海海線（台11線）兩大動脈，建議自駕或租機車最靈活。台灣好行觀光巴士也是選擇。台東的慢活步調是最大魅力，行程別排太滿。熱氣球嘉年華（7-8月）是台東最大盛事，鹿野高台是主場地。正氣路觀光夜市僅週四五六日開。知本溫泉適合秋冬季前往。台東機場有立榮航空航班，也可搭火車到台東站再轉乘。","image_slides":[57],"images":["台東_57.jpg"]},"澎湖":{"routes":[{"name":"馬公市區、海洋牧場、花火節","stops":["抵達澎湖/租機車","中央老街","篤行十村","海洋牧場","澎湖花火節"],"description":"Day1 市區"},{"name":"澎湖南環一日遊","stops":["風櫃洞","蛇頭山","山水沙灘","隘門沙灘","奎壁山摩西分海","南寮古厝","夜釣小管"],"description":"Day2 南環"},{"name":"澎湖北環一日遊1","stops":["後寮天堂路","池東大菓葉玄武岩","三石壁","二崁聚落","池西岩瀑","小池角雙曲橋","漁翁島燈塔","三仙塔/外垵漁港","西嶼西臺"],"description":"Day3 北環"},{"name":"澎湖北環一日遊2","stops":["吉貝島","澎湖水族館","通樑古榕","跨海大橋","鯨魚洞/小門地質館","大義宮"],"description":"Day4 北環"},{"name":"七美、望安跳島一日遊","stops":["雙心石滬","小台灣","大獅風景區","七美人塚","網垵口沙灘","花宅聚落","天台山","買伴手禮/返台"],"description":"Day5 跳島"}],"food":[{"name":"小萍的店小管麵線","description":"鯨魚洞附近超人氣，招牌小管麵線配小管醬小魚干醬"},{"name":"洪家炸粿","description":"1976年創立近50年，林投公園發跡，狗蝦蚵仔炸粙酥香不膩"},{"name":"赤崁炸粿","description":"馬公民權路下午開攤就爆滿，烏龜背蝦造型，內餡高麗菜紅蘿蔔配狗蝦"},{"name":"港口土魠魚羹","description":"早餐店形式，土魠魚漢堡蛋餅燒餅刈包配土魠魚羹，創意吃法"},{"name":"外婆麵猴","description":"馬公永和街，食尚玩家推薦，超Q彈海味麵疙瘩"},{"name":"郵局口蔥油餅","description":"馬公必吃，食尚玩家推薦，現擀現炸加辣醬蒜泥"},{"name":"大漢花枝丸","description":"天后宮旁，真材實料花枝打漿，彈牙花枝塊鮮甜扎實"},{"name":"旺旺手工海菜煎餅","description":"通梁古榕對面路邊攤，新鮮野生海菜現煎，外酥鹹香帶海味"},{"name":"清峰海鮮紫菜冬粉","description":"新鮮紫菜拌炒冬粉，澎湖黑金入菜，鹹香海味十足"},{"name":"紫光金瓜炒米粉","description":"在地人最愛，新鮮南瓜果肉配海鮮拌炒，金瓜炒米粉海霸煎必點"}],"stay":[],"tips":"澎湖花火節4-6月。建議5天4夜。需租機車或汽車。","image_slides":[58,59],"images":["澎湖_58.jpg"]},"金馬":{"routes":[{"name":"金城歷史戰地一日遊","stops":["莒光樓","珠山聚落","翟山坑道","水頭聚落","八二三戰史館","古寧頭戰史館"],"description":"金門最經典的戰地歷史路線，從金門地標莒光樓出發，穿越閩南古村珠山聚落，走進八二三砲戰與古寧頭戰役的歷史現場，感受兩岸最激烈的歷史衝突遺跡。"},{"name":"金東秘境探索一日遊","stops":["金門市區","天摩山步道","船型堡","陳景蘭洋樓","山后民俗村","馬山觀測所"],"description":"金東半島深度路線，探訪秘境天摩山步道、戰地遺跡船型堡、精美洋樓陳景蘭洋樓與山后民俗村閩南建築群，最遠到馬山觀測所看對岸。"},{"name":"烈嶼小金門一日遊","stops":["金門市區","金門大橋","九宮坑道","沙溪堡","湖井頭戰史館","西方村","湖下彩繪村"],"description":"經金門大橋前往小金門烈嶼，深入戰地遺跡九宮坑道、沙溪堡，漫步古樸西方村落欣賞百年風獅爺，品嚐在地美食，感受小金門的文化底蘊。"},{"name":"太武山生態文化一日遊","stops":["金門市區","瓊林風獅爺","瓊林坑道","太武山","海印寺","建功嶼"],"description":"從最具代表性的瓊林風獅爺出發，走進450公尺的瓊林坑道消暑，登太武山看「毋忘在莒」石刻，再到摩西分海建功嶼看潮間帶生態。"},{"name":"大膽島烈嶼雙重奇遇一日遊","stops":["金門市區","藍色公路巡航","大膽島","烈嶼漫步"],"description":"登陸大膽島感受戰地歷史滄桑，巡航藍色公路感受兩岸咫尺之遙的特殊氛圍，漫步烈嶼小金門，享用金門特色小吃。需提前申請，限量開放。"},{"name":"鱟生態與海岸落日一日遊","stops":["金門市區","金門水產試驗所","建功嶼","金門大橋","慈湖落日"],"description":"認識活化石「鱟」的生態之旅，退潮時走建功嶼摩西分海，黃昏到慈湖看落日，是金門最chill的自然文化路線。"},{"name":"南竿戰地文化一日遊","stops":["福澳港","馬祖酒廠","八八坑道","馬祖故事館","北海坑道（搖櫓）","鐵堡","津沙聚落","福山公園（枕戈待旦）"],"description":"南竿戰地文化精華路線，從福山公園「枕戈待旦」地標出發，參觀八八坑道窖藏美酒、北海坑道夜間搖櫓看藍眼淚（4-9月），鐵堡看海景，津沙聚落拍石頭屋。"},{"name":"北竿芹壁聚落一日遊","stops":["南竿","南北之星快船","北竿","芹壁聚落","坂里沙灘","塘后道沙灘","北海坑道","壁山觀景"],"description":"北竿最精華路線，芹壁聚落是馬祖唯一保存完整的石頭屋聚落，被譽為「台灣地中海」，坂里沙灘看藍眼淚，北海坑道2025年4月重新開放。從南竿搭15分鐘船到北竿。"},{"name":"東引國境之北一日遊","stops":["南竿","新臺馬輪","東引","中柱港","中柱島","國之北疆","安東坑道","烈女義坑","東引燈塔"],"description":"台灣國境最北路線，搭新臺馬輪前往東引，國之北疆石碑打卡、安東坑道35度斜坡挑戰、烈女義坑看海蝕地形、東引燈塔百年歐式建築。東引風景最美但最遠。"},{"name":"莒光藍眼淚生態一日遊","stops":["南竿","東莒","東莒燈塔","福正聚落","大埔石刻","西莒","坤坵沙灘"],"description":"莒光兩島路線，東莒百年燈塔與福正聚落石頭屋，西莒坤坵沙灘是藍眼淚熱點。莒光較少遊客，適合深度旅行者。需從南竿搭船前往。"},{"name":"南竿深度文化美食一日遊","stops":["介壽獅子市場","阿妹的店鼎邊糊","勝利堡","831軍中茶室","刺鳥咖啡書店","神農居海鮮鍋"],"description":"從介壽獅子市場二樓的南竿美食巡禮開始，阿妹的店鼎邊糊搭配繼光餅漢堡，參觀勝利堡戰地博物館與831軍中茶室歷史，下午到刺鳥咖啡書店（12據點迷彩外觀的獨立書店）喝咖啡。"}],"food":[{"name":"永春廣東粥","description":"金門式早午餐首選，米粥綿密細滑、配料豐富，是金門最具代表性的早餐。位於模範街，金門必吃美食。"},{"name":"良金牧場牛肉麵","description":"金門溫體牛肉麵，現沖現切酒糟牛肉鋪在Q彈手工麵條上，高湯淋下後牛肉略帶粉紅，口感滑嫩。金門牛肉因餵食酒糟而風味獨特。"},{"name":"山西拌麵","description":"長榮山西拌麵是老蔣愛店，簡單的麻醬拌麵卻是金門最具代表性麵食，搭配貢糖、高粱酒是金門專屬的味道。"},{"name":"金門蚵仔煎","description":"金門外海盛產牡蠣（蚵仔），鮮度超高，在地吃才夠味。湖下信源海產的蚵仔煎、炒沙蟲、高粱嗆蟹都是必點。"},{"name":"閩式燒餅","description":"金門特色早餐，清晨6點就排隊的銷魂燒餅，酥香口感是金門獨特味道，山外地區多家人氣燒餅店。"},{"name":"金門貢糖","description":"金門最知名伴手禮，花生口味最經典，每盒從幾十元到數百元，適合帶回台灣與親友分享。"},{"name":"高粱酒","description":"金門最知名特產，在產地購買更有紀念意義。金門高粱酒香醇聞名全台，八八坑道可參觀窖藏。"},{"name":"老酒麵線","description":"馬祖最具代表性美食，家家戶戶自釀老酒，酒香濃郁的湯頭搭配細麵線與炸蛋，是馬祖的靈魂美食。推薦福臨老酒麵線（介壽獅子市場二樓）、香林小館、比薩大王。"},{"name":"繼光餅","description":"馬祖版漢堡，貼在壁爐上碳烤後再入油鍋炸至金黃，外酥內軟搭配烘蛋蚵仔等配料，是馬祖必吃特色小吃。介壽獅子市場阿妹的店最知名。"},{"name":"淡菜","description":"馬祖海域盛產淡菜（貽貝），9月最肥美鮮甜，清炒或煮湯都鮮味十足。比薩大王、香林小館、神農居都吃得到。馬祖的海鮮代表。"},{"name":"黃金地瓜餃","description":"馬祖特色甜點，Q彈地瓜外皮包入花生餡，蒸或炸都美味，是馬祖家家戶戶的傳統點心。"},{"name":"鼎邊糊","description":"閩東特色小吃，麵糊沿鍋邊淋下煮熟後刮入湯底，搭配豐富海鮮配料，是介壽獅子市場阿妹的店招牌。"},{"name":"馬祖魚麵","description":"馬祖獨特麵食，以魚漿製成麵條，鮮味十足口感Q彈，是馬祖戰地時期發展出的特色料理。東引烹小鮮餐廳可品嚐。"},{"name":"紅糟料理","description":"馬祖老酒釀造後的紅糟入菜，紅糟雞肉串、紅糟鰻、老酒蛋雞湯都是特色料理，色澤紅潤風味獨特。"}],"stay":[{"name":"金湖飯店","description":"金門金湖鎮知名飯店，生活機能佳，鄰近山外美食區與多個景點，是金門住宿的熱門選擇之一。"},{"name":"古寧歇心苑古厝民宿","description":"300年閩南官宅古厝民宿，好客民宿認證，房價NT$5380~7880。典雅古樸環境，體會金門文化底蘊的最佳住宿體驗。位於金寧鄉古寧頭。"},{"name":"Solis Hotel 金金禮寓","description":"2026年金門新開飯店，現代化設施搭配金門在地元素，是金門少見的精緻旅店選擇。"},{"name":"慢漫民宿-聽風館","description":"好客民宿與環保旅店認證，房價NT$3000~3800，特色閩式老宅改建，體驗金門傳統建築文化。"},{"name":"芹壁幸福海岸民宿","description":"北竿芹壁聚落海景第一排民宿，芹壁是馬祖唯一保存完整的聚落保存區，花崗石建築依山傍海，被譽為「台灣地中海」。民宿編號051，面向龜島無敵海景。"},{"name":"芹壁水漾","description":"被稱為「馬祖最美民宿」，保留花崗岩石頭屋建築，人文與現代交錯，全新佈置舒適愜意。位於北竿芹壁，是藍眼淚季最搶手的住宿。"},{"name":"香檳民宿（南竿）","description":"南竿合法民宿，鄰近福澳港交通便利，是南竿旅遊的住宿基地。馬祖合法旅宿可搜尋台灣旅宿網查詢。"},{"name":"芹壁德順號民宿","description":"百年歷史人文古樸民宿，前身是提供漁民捕魚休憩的海上驛站。一館雙臥室家庭房、二館海景雙人房，感受芹壁聚落的質樸無華。"}],"tips":"金門：戰地風情+閩南建築。馬祖：藍眼淚+戰地文化。","images":[]}};
const ORDER = ["基隆", "雙北", "宜蘭", "桃園", "新竹", "苗栗", "台中", "南投", "彰化", "雲林", "嘉義", "台南", "高雄", "屏東", "花蓮", "台東", "澎湖", "金馬"];
let currentCounty = '基隆';
let currentTab = 'routes';

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function selectCounty(c){
  currentCounty = c;
  currentTab = 'routes';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const item = document.querySelector(`[data-county="${c}"]`);
  if(item){item.classList.add('active');}
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  render();
}

function selectTab(t){
  currentTab = t;
  render();
}

function showImage(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

function render(){
  const d = DATA[currentCounty];
  const routes = d.routes||[];
  const food = d.food||[];
  const stay = d.stay||[];
  const tips = d.tips||'';
  const images = d.images||[];

  let galleryHtml = '';
  if(images.length){
    galleryHtml = `<div class="gallery">
      <div class="gallery-title">📸 ${currentCounty}景點照片</div>
      <div class="gallery-scroll">
        ${images.map(img=>`<div class="gallery-item" onclick="showImage('travel-images/${img}')"><img src="travel-images/${img}" loading="lazy"></div>`).join('')}
      </div>
    </div>`;
  }

  const html = `
    <div class="fade-in">
      <div class="main-header">
        <h2>${currentCounty}</h2>
        ${tips?`<div class="tips">${tips}</div>`:''}
      </div>
      <div class="stats">
        <div class="stat-card"><div class="num">${routes.length}</div><div class="label">路線</div></div>
        <div class="stat-card"><div class="num">${food.length}</div><div class="label">美食</div></div>
        <div class="stat-card"><div class="num">${stay.length}</div><div class="label">住宿</div></div>
      </div>
      ${galleryHtml}
      <input class="search-bar" placeholder="搜尋景點、美食..." oninput="filterSearch(this.value)">
      <div class="tabs">
        <div class="tab ${currentTab==='routes'?'active':''}" onclick="selectTab('routes')">🛣️ 路線 (${routes.length})</div>
        <div class="tab ${currentTab==='food'?'active':''}" onclick="selectTab('food')">🍜 美食 (${food.length})</div>
        <div class="tab ${currentTab==='stay'?'active':''}" onclick="selectTab('stay')">🏨 住宿 (${stay.length})</div>
      </div>
      <div id="tab-content">${renderTab(routes,food,stay)}</div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function renderTab(routes,food,stay){
  if(currentTab==='routes'){
    if(!routes.length) return '<p style="color:#999;padding:20px;">尚無路線資料</p>';
    return routes.map((r,i)=>{
      const stops = (r.stops||[]).map((s,j)=>{
        const arr = (r.stops||[]);
        if(j<arr.length-1) return `<span class="stop">${s}</span><span class="stop-arrow">→</span>`;
        return `<span class="stop">${s}</span>`;
      }).join('');
      return `<div class="route-card">
        <div class="route-name">${i+1}. ${r.name||'路線'+(i+1)}</div>
        ${r.description?`<div class="route-desc">${r.description}</div>`:''}
        <div class="stops">${stops}</div>
      </div>`;
    }).join('');
  }
  if(currentTab==='food'){
    if(!food.length) return '<p style="color:#999;padding:20px;">尚無美食資料</p>';
    return food.map(f=>`<div class="food-card">
      <div class="icon">🍴</div>
      <div class="info">
        <div class="name">${f.name}</div>
        ${f.description?`<div class="desc">${f.description}</div>`:''}
      </div>
    </div>`).join('');
  }
  if(currentTab==='stay'){
    if(!stay.length) return '<p style="color:#999;padding:20px;">尚無住宿資料</p>';
    return stay.map(s=>`<div class="stay-card">
      <div class="name">🏨 ${s.name}</div>
      ${s.description?`<div class="desc">${s.description}</div>`:''}
    </div>`).join('');
  }
  return '';
}

function filterSearch(q){
  q = q.toLowerCase().trim();
  const d = DATA[currentCounty];
  let routes = d.routes||[], food = d.food||[], stay = d.stay||[];
  if(q){
    routes = routes.filter(r=>(r.name||'').toLowerCase().includes(q)||(r.stops||[]).join(' ').toLowerCase().includes(q));
    food = food.filter(f=>(f.name||'').toLowerCase().includes(q)||(f.description||'').toLowerCase().includes(q));
    stay = stay.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q));
  }
  document.getElementById('tab-content').innerHTML = renderTab(routes,food,stay);
}
