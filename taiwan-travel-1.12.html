</div>

</div>

<script>

function loadCityMap(city){
  const img = document.getElementById('city-map-img');
  if(!img) return;
  const exts = ['.png','.jpg','.gif'];
  img.style.display='none';
  function tryExt(i){
    if(i>=exts.length){img.style.display='none';return;}
    img.src = 'maps/'+city+exts[i];
    img.onload = function(){img.style.display='';};
    img.onerror = function(){tryExt(i+1);};
  }
  tryExt(0);
}

function hasTag(f,t){if(!f.tags)return false;if(Array.isArray(f.tags))return f.tags.includes(t);return !!f.tags[t];}
const DATA = {};
const ORDER = ["基隆", "台北", "新北", "宜蘭", "桃園", "新竹", "苗栗", "台中", "南投", "彰化", "雲林", "嘉義", "台南", "高雄", "屏東", "花蓮", "台東", "澎湖", "金馬"];
let currentCounty = '台北';
let currentTab = 'routes';

const CITY_EN = {"基隆":"keelung","台北":"taipei","新北":"newtaipei","宜蘭":"yilan","桃園":"taoyuan","新竹":"hsinchu","苗栗":"miaoli","台中":"taichung","南投":"nantou","彰化":"changhua","雲林":"yunlin","嘉義":"chiayi","台南":"tainan","高雄":"kaohsiung","屏東":"pingtung","花蓮":"hualien","台東":"taitung","澎湖":"penghu","金馬":"kinmen"};

// Load metadata + nightmarkets first (small files)
Promise.all([
  fetch('data/meta.json').then(r=>r.json()),
  fetch('data/nightmarkets.json').then(r=>r.json())
]).then(([meta, nm])=>{
  DATA._updatedAt = meta._updatedAt || '';
  DATA.nightmarkets = nm;
  initApp();
  // Load default city
  loadCounty(currentCounty);
}).catch(e=>{
  console.error('Failed to load meta',e);
  document.querySelector('.main').innerHTML='<p style="padding:40px;text-align:center">資料載入失敗，請稍後再試</p>';
});

function loadCounty(c){
  if(!c) { console.error('loadCounty: no county specified'); return; }
  if(DATA[c]) { currentCounty=c; render(); return; }
  const en = CITY_EN[c] || c;
  fetch('data/'+en+'.json').then(r=>{
    if(!r.ok) throw new Error('HTTP '+r.status+' for data/'+en+'.json');
    return r.json();
  }).then(d=>{
    DATA[c]=d;
    currentCounty=c;
    // Update badge
    const badge = document.getElementById('badge-'+c);
    if(badge) badge.textContent = (d.food||[]).length;
    render();
  }).catch(e=>{
    console.error('Failed to load county',c,e);
    document.getElementById('content').innerHTML='<p style="padding:40px;text-align:center">'+c+'資料載入失敗: '+e.message+'</p>';
  });
}

function gmapLink(query, county){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query + ' ' + county + ' 台灣')}`;
}

function toggleDishes(card){
  const list = card.querySelector('.dishes-list');
  if(list) list.classList.toggle('show');
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function selectCounty(c){
  currentCounty = c;
  currentTab = 'food';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const item = document.querySelector(`[data-county="${c}"]`);
  if(item){item.classList.add('active');}
  const hamText = document.getElementById('hamText');
  if(hamText) hamText.textContent = c;
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  loadCounty(c);
}

function selectTab(t){
  currentTab = t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
  renderTabContent();
}

function showImage(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

function toggleArea(id){
  const body = document.getElementById(id);
  const arrow = document.getElementById('arrow-'+id);
  body.classList.toggle('collapsed');
  arrow.classList.toggle('collapsed');
}

function filterRoute(btn, tag){
  document.querySelectorAll('.route-tag-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.route-card').forEach(card=>{
    if(!tag || (card.dataset.tags||'').split(',').includes(tag)){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

function filterNMType(btn, type){
  document.querySelectorAll('.nm-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.nm-card').forEach(card=>{
    if(!type || card.dataset.nmType === type){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

function filterArea(btn, area){
  document.querySelectorAll('.area-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Get current active cat filter
  const activeCatBtn = document.querySelector('.food-cat-btn:not(.area-btn).active');
  const activeCat = activeCatBtn ? activeCatBtn.textContent.trim() : '';
  // Reset all cards first
  document.querySelectorAll('.food-card').forEach(card=>{card.style.display='';});
  // Filter area groups and cards by BOTH area AND cat
  document.querySelectorAll('.area-group').forEach(group=>{
    if(!area || area==='全區' || group.dataset.area === area){
      group.style.display = '';
    } else {
      group.style.display = 'none';
    }
  });
  if(activeCat && activeCat !== '全部'){
    document.querySelectorAll('.food-card').forEach(card=>{
      const cats = (card.dataset.cats||'').split(',');
      if(!cats.includes(activeCat)){
        card.style.display = 'none';
      }
    });
  }
  // Hide empty area groups
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    }
  });
}

function filterFoodSearch(query){
  query = query.trim().toLowerCase();
  const activeCat = document.querySelector('.food-cat-btn.active');
  const activeCatText = activeCat ? activeCat.textContent.trim() : '全部';
  const activeAreaBtn = document.querySelector('.area-btn.active');
  const activeArea = activeAreaBtn ? activeAreaBtn.textContent.trim() : '';
  document.querySelectorAll('.food-card').forEach(card=>{
    const name = (card.querySelector('.name')||{}).textContent || '';
    const desc = (card.querySelector('.desc')||{}).textContent || '';
    const cats = (card.dataset.cats||'').split(',');
    const cardArea = card.closest('.area-group') ? card.closest('.area-group').dataset.area : '';
    const areaMatch = !activeArea || activeArea==='全區' || cardArea === activeArea;
    const catMatch = activeCatText==='全部' || cats.includes(activeCatText);
    const queryMatch = !query || name.toLowerCase().includes(query) || desc.toLowerCase().includes(query);
    if(areaMatch && catMatch && queryMatch){card.style.display='';} else {card.style.display='none';}
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    group.style.display = visible.length ? '' : 'none';
  });
}

function filterFood(btn, cat){
  // Toggle active cat button only (NOT area buttons)
  document.querySelectorAll('.food-cat-btn:not(.area-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Get current active area filter
  const activeAreaBtn = document.querySelector('.area-btn.active');
  const activeArea = activeAreaBtn ? activeAreaBtn.textContent.trim() : '';
  // Filter cards by BOTH cat AND area
  document.querySelectorAll('.food-card').forEach(card=>{
    const cats = (card.dataset.cats||'').split(',');
    const cardArea = card.closest('.area-group') ? card.closest('.area-group').dataset.area : '';
    const catMatch = !cat || cats.includes(cat);
    const areaMatch = !activeArea || activeArea==='全區' || cardArea === activeArea;
    if(catMatch && areaMatch){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  // Hide empty area groups
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function filterFootSoak(btn){
  document.querySelectorAll('.food-cat-btn:not(.area-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.food-card').forEach(card=>{
    if(card.dataset.footsoak === '1'){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function filterPopular(btn){
  document.querySelectorAll('.food-cat-btn:not(.area-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.food-card').forEach(card=>{
    if(card.dataset.popular === '1'){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function filterMichelin(btn){
  document.querySelectorAll('.food-cat-btn:not(.area-btn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.food-card').forEach(card=>{
    if(card.dataset.michelin === '1'){
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.area-group').forEach(group=>{
    const visible = group.querySelectorAll('.food-card:not([style*="display: none"])');
    if(visible.length === 0){
      group.style.display = 'none';
    } else {
      group.style.display = '';
    }
  });
}

function render(){
  const d = DATA[currentCounty];
  if(!d){ document.getElementById('content').innerHTML='<p style="padding:40px;text-align:center;">載入中...</p>'; return; }
  const routes = d.routes||[];
  const food = d.food||[];
  const tips = d.tips||'';

  const html = `
    <div class="fade-in">
      <div class="main-header">
        <h2>${currentCounty}</h2>
        ${tips?`<div class="tips">${tips}</div>`:''}
        <div class="header-right-info" style="font-size:12px; color:#666; text-align:right;">
          <div>更新於 2026-07-17</div>
          <div>版次 V1.12</div>
        </div>
      </div>
      
      <div class="tabs">
        <div class="tab ${currentTab==='routes'?'active':''}" onclick="selectTab('routes')">🛣️ 路線 (${routes.length})</div>
        <div class="tab ${currentTab==='spots'?'active':''}" onclick="selectTab('spots')">📸 景點 (${(d.spots||[]).length})</div>
        <div class="tab ${currentTab==='souvenirs'?'active':''}" onclick="selectTab('souvenirs')">🏪 伴手禮 (${(d.souvenirs||[]).length})</div>
        <div class="tab ${currentTab==='food'?'active':''}" onclick="selectTab('food')">🍜 美食 (${food.length})</div>
        
        <div class="tab ${currentTab==='nightmarkets'?'active':''}" onclick="selectTab('nightmarkets')">🌃 夜市老街 (${(DATA.nightmarkets||[]).filter(m=>m.city===currentCounty).length})</div>
      </div>
      <div id="tab-content"></div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
  renderTabContent();
}

function renderTabContent(){
  const d = DATA[currentCounty];
  if(!d) return;
  const routes = d.routes||[];
  const food = d.food||[];
  const el = document.getElementById('tab-content');
  if(!el) return;
  el.innerHTML = renderTab(routes,food,d.spots||[],d.souvenirs||[]);
}

function renderTab(routes,food,spots,souvenirs){
  if(currentTab==='routes'){
    if(!routes.length) return '<p style="color:#999;padding:20px;">尚無路線資料</p>';
    // Collect all route tags
    const allTags = new Set();
    routes.forEach(r=>{(r.tags||['一般路線']).forEach(t=>allTags.add(t))});
    const tagList = Array.from(allTags);
    // Tag filter bar
    let tagBar = '<div class="food-cat-bar"><button class="food-cat-btn active" onclick="filterRoute(this,\'\')">全部</button>';
    tagList.forEach(t=>{
      const tagColor = t==='雨天路線'?'rain':t==='樂齡路線'?'senior':t==='懶人美食'?'food':t==='食尚玩家'?'sstc':'general';
      tagBar += `<button class="food-cat-btn route-tag-btn route-${tagColor}" onclick="filterRoute(this,'${t}')">${t}</button>`;
    });
    tagBar += '</div>';
    return tagBar + routes.map((r,i)=>{
      const rTags = (r.tags||['一般路線']).map(t=>{
        const cls = t==='雨天路線'?'rain':t==='樂齡路線'?'senior':t==='懶人美食'?'food':t==='食尚玩家'?'sstc':'general';
        return `<span class="route-tag route-tag-${cls}">${t}</span>`;
      }).join('');
      const stops = (r.stops||[]).map((s,j)=>{
        const arr = (r.stops||[]);
        const link = `<a href="${gmapLink(s,currentCounty)}" target="_blank" title="Google Maps 導航">📍</a>`;
        if(j<arr.length-1) return `<span class="stop">${s}${link}</span><span class="stop-arrow">→</span>`;
        return `<span class="stop">${s}${link}</span>`;
      }).join('');
      return `<div class="route-card" data-tags="${(r.tags||['一般路線']).join(',')}">
        <div class="route-name">${i+1}. ${r.name||'路線'+(i+1)} <span class="route-tags">${rTags}</span></div>
        ${r.description?`<div class="route-desc">${r.description}</div>`:''}
        <div class="stops">${stops}</div>
      </div>`;
    }).join('');
  }
  if(currentTab==='food'){
    if(!food.length) return '<p style="color:#999;padding:20px;">尚無美食資料</p>';
    // Collect all categories
    const allCats = new Set();
    food.forEach(f=>{(f.categories||['其他']).forEach(c=>allCats.add(c))});
    const catOrder = ['中式','西式','日式','異國','義式','甜品','咖啡廳','火鍋','素食','烘焙']; const catList = [...catOrder.filter(c=>allCats.has(c)), ...Array.from(allCats).filter(c=>!catOrder.includes(c))];
    // Collect areas
    const allAreas = new Set();
    food.forEach(f=>{if(f.area && f.area.trim()) allAreas.add(f.area)});
    const areaList = Array.from(allAreas);
    // Area filter bar (top row)
    let areaBar = '<div class="food-cat-bar"><button class="food-cat-btn area-btn active" onclick="filterArea(this,\'\')">全區</button>';
    areaList.forEach(a=>{
      let displayA = a.replace(/[鄉鎮市]$/, '');
      if (displayA.length > 2 && displayA.endsWith('區')) displayA = displayA.slice(0, -1);
      areaBar += `<button class="food-cat-btn area-btn" onclick="filterArea(this,'${a}')">${displayA}</button>`;
    });
    areaBar += '</div>';
    // Category filter bar (second row)
    let catBar = '<div class="food-cat-bar"><button class="food-cat-btn active" onclick="filterFood(this,\'\')">全部</button>';
    catList.forEach(c=>{
      catBar += `<button class="food-cat-btn" onclick="filterFood(this,'${c}')">${c}</button>`;
    });
    // Add special filter buttons
    // Tags shown on cards only, no filter buttons
    catBar += '</div>';
    // 排序按鈕（僅定位後顯示距離排序）
    if (userLocation) {
      catBar += '<div style="margin:4px 0 8px;">';
      catBar += `<span class="sort-btn ${sortMode==='distance'?'active':''}" onclick="setSortMode('distance')">📏 距離排序</span>`;
      catBar += `<span class="sort-btn ${sortMode==='weighted'?'active':''}" onclick="setSortMode('weighted')">📊 加權排序</span>`;
      catBar += '</div>';
    }
    // Sort food: weighted score (rating * log reviews) + small boost for _sort (食尚玩家)
    const sortedFood = [...food].sort((a,b)=>{
      if (sortMode === 'distance' && userLocation) {
        const aD = a.lat != null ? haversine(userLocation.lat, userLocation.lng, a.lat, a.lng) : Infinity;
        const bD = b.lat != null ? haversine(userLocation.lat, userLocation.lng, b.lat, b.lng) : Infinity;
        return aD - bD;
      }
      // 原始加權排序
      const aW = (a.rating||0) * Math.log10((a.reviews||0)+1);
      const bW = (b.rating||0) * Math.log10((b.reviews||0)+1);
      const aS = a._sort !== undefined ? (3 - a._sort) : 0;
      const bS = b._sort !== undefined ? (3 - b._sort) : 0;
      const aFinal = aW + aS;
      const bFinal = bW + bS;
      if(Math.abs(bFinal - aFinal) > 0.01) return bFinal - aFinal;
      return (b.reviews||0) - (a.reviews||0);
    });
    const groups = {};
    // Put no-area entries first without group header
    const noArea = sortedFood.filter(f=>!f.area || !f.area.trim());
    const hasArea = sortedFood.filter(f=>f.area && f.area.trim());
    hasArea.forEach(f=>{
      const area = f.area;
      if(!groups[area]) groups[area] = [];
      groups[area].push(f);
    });
    // No-area cards (shown first, no group header)
    let noAreaHtml = '';
    if(noArea.length){
      const noAreaCards = noArea.map(f=>{
        const firstCat = (f.categories||[])[0]||'';
  const link = gmapLink(f.name, currentCounty + (firstCat?' '+firstCat:''));
        let ratingHtml = '';
        if(f.rating !== null && f.rating !== undefined && f.rating > 0){
          const stars = '★'.repeat(1);
          ratingHtml = `<span class="rating"><span class="stars">${stars}</span> ${f.rating}`;
          if(f.reviews !== null && f.reviews !== undefined && f.reviews > 0){
            ratingHtml += ` <span class="reviews">(${f.reviews.toLocaleString()}則)</span>`;
          }
          ratingHtml += `</span>`;
        }
        const cats = (f.categories||['其他']).map(c=>`<span class="food-tag">${c}</span>`).join('');
        const isPopular = (f.rating>=4.0 && f.reviews>=1000);
        const popularTag = isPopular ? '<span class="food-tag popular">🔥 人氣</span>' : '';
        const michelinTag = hasTag(f,'michelin-star') ? '\u003cspan class="food-tag michelin-star"\u003e\u7c73\u5176\u6797\u003c/span\u003e' : hasTag(f,'michelin-bib') ? '\u003cspan class="food-tag michelin-bib"\u003e\u5fc5\u6bd4\u767b\u003c/span\u003e' : hasTag(f,'michelin-selected') ? '\u003cspan class="food-tag michelin-selected"\u003e\u7c73\u5176\u6797\u5165\u9078\u003c/span\u003e' : '';
        const sstcTag = (hasTag(f,'sp')) ? '\u003cspan class="food-tag sstc"\u003e\ud83c\udfa5 \u98df\u5c1a\u73a9\u5bb6\u003c/span\u003e' : '';
        return `<div class="food-card" data-cats="${(f.categories||['其他']).join(',')}" data-popular="${isPopular?1:0}" data-michelin="${(hasTag(f,'michelin-star')||hasTag(f,'michelin-bib')||hasTag(f,'michelin-selected'))?1:0}" data-footsoak="0">
          <div class="info">
            <div class="name">${f.name}${ratingHtml}<span class="card-actions"><a class="glink" href="${link}" target="_blank">📍 導航</a>${uberLink(f.lat, f.lng, f.name)}</span></div>
            <div class="food-tags">${distBadge(f.lat, f.lng)}${michelinTag}${popularTag}${sstcTag}${cats}</div>

            ${(f.dishes&&f.dishes.length)?`<div class="dishes-btn" onclick="toggleDishes(this.parentElement)">🍽 推薦品項</div><div class="dishes-list">${f.dishes.map(d=>`<div class="dish-item"><span class="dish-name">${d.name}</span>${d.price?` <span class="dish-price">$${d.price}</span>`:''} <span class="dish-desc">${d.description||''}</span></div>`).join('')}</div>`:''}
          </div>
        </div>`;
      }).join('');
      noAreaHtml = `<div class="area-group" data-area="">\n        <div class="area-body">${noAreaCards}</div>\n      </div>`;
    }
    return areaBar + catBar + noAreaHtml + Object.keys(groups).map(area=>{
      const items = groups[area];
      const id = 'area-' + area.replace(/[^a-zA-Z0-9]/g,'');
      const cards = items.map(f=>{
        const link = gmapLink(f.name, currentCounty + ' ' + area);
        let ratingHtml = '';
        if(f.rating !== null && f.rating !== undefined && f.rating > 0){
          const stars = '★'.repeat(1);
          ratingHtml = `<span class="rating"><span class="stars">${stars}</span> ${f.rating}`;
          if(f.reviews !== null && f.reviews !== undefined && f.reviews > 0){
            ratingHtml += ` <span class="reviews">(${f.reviews.toLocaleString()}則)</span>`;
          }
          ratingHtml += `</span>`;
        }
        const cats = (f.categories||['其他']).map(c=>`<span class="food-tag">${c}</span>`).join('');
        const isPopular = (f.rating>=4.0 && f.reviews>=1000);
        const popularTag = isPopular ? '<span class="food-tag popular">🔥 人氣</span>' : '';
        const michelinTag = hasTag(f,'michelin-star') ? '\u003cspan class="food-tag michelin-star"\u003e\u7c73\u5176\u6797\u003c/span\u003e' : hasTag(f,'michelin-bib') ? '\u003cspan class="food-tag michelin-bib"\u003e\u5fc5\u6bd4\u767b\u003c/span\u003e' : hasTag(f,'michelin-selected') ? '\u003cspan class="food-tag michelin-selected"\u003e\u7c73\u5176\u6797\u5165\u9078\u003c/span\u003e' : '';
        const isFootSoak = (f.description||'').includes('\u6ce1\u8173')||(f.name||'').includes('\u6ce1\u8173');
        const footSoakTag = isFootSoak ? '\u003cspan class="food-tag footsoak"\u003e\ud83e\uddb6 \u6ce1\u8173\u5496\u5561\u003c/span\u003e' : '';
        const sstcTag = (hasTag(f,'sp')) ? '\u003cspan class="food-tag sstc"\u003e\ud83c\udfa5 \u98df\u5c1a\u73a9\u5bb6\u003c/span\u003e' : '';
        return `\u003cdiv class="food-card" data-cats="${(f.categories||['\u5176\u4ed6']).join(',')}" data-popular="${isPopular?1:0}" data-michelin="${(hasTag(f,'michelin-star')||hasTag(f,'michelin-bib')||hasTag(f,'michelin-selected'))?1:0}" data-footsoak="${isFootSoak?1:0}"\u003e
          \u003cdiv class="info"\u003e
            \u003cdiv class="name"\u003e ${f.name}${ratingHtml}\u003cspan class="card-actions"\u003e\u003ca class="glink" href="${link}" target="_blank"\u003e\ud83d\udccd \u5c0e\u822a\u003c/a\u003e${uberLink(f.lat, f.lng, f.name)}\u003c/span\u003e\u003c/div\u003e
            \u003cdiv class="food-tags"\u003e${distBadge(f.lat, f.lng)}${michelinTag}${popularTag}${footSoakTag}${sstcTag}${cats}\u003c/div\u003e

            ${(f.description&&!/^Google \d+\.?\d*★ \d+評論$/.test(f.description))?`\u003cdiv class="desc"\u003e${f.description}\u003c/div\u003e`:''}
            ${(f.dishes&&f.dishes.length)?`<div class="dishes-btn" onclick="toggleDishes(this.parentElement)">🍽 推薦品項</div><div class="dishes-list">${f.dishes.map(d=>`<div class="dish-item"><span class="dish-name">${d.name}</span>${d.price?` <span class="dish-price">$${d.price}</span>`:''} <span class="dish-desc">${d.description||''}</span></div>`).join('')}</div>`:''}
          \u003c/div\u003e
          
        \u003c/div\u003e`;
      }).join('');
      return `<div class="area-group" data-area="${area}">
        <div class="area-header" onclick="toggleArea('${id}')">
          <span class="area-arrow" id="arrow-${id}">▼</span>
          <span class="area-title">📍 ${area}</span>
          <span class="area-count">${items.length} 家</span>
        </div>
        <div class="area-body" id="${id}">${cards}</div>
      </div>`;
    }).join('');
  }
  if(currentTab==='indoor'){
    return '<p style="color:#999;padding:20px;">室內景點資料整理中</p>';
  }
  if(currentTab==='spots'){
    if(!spots.length) return '<p style="color:#999;padding:20px;">尚無景點資料</p>';
    const groups = {};
    spots.forEach(s=>{
      const area = s.area || '其他';
      if(!groups[area]) groups[area] = [];
      groups[area].push(s);
    });
    return Object.keys(groups).map(area=>{
      const items = groups[area];
      const id = 'spot-area-' + area.replace(/[^a-zA-Z0-9]/g,'');
      const cards = items.map(s=>{
        const link = gmapLink(s.name, currentCounty + ' ' + area);
        let ratingHtml = '';
        if(s.rating !== null && s.rating !== undefined){
          const stars = '★'.repeat(1);
          ratingHtml = `<span class="rating"><span class="stars">${stars}</span> ${s.rating}`;
          if(s.reviews !== null && s.reviews !== undefined){
            ratingHtml += ` <span class="reviews">(${s.reviews.toLocaleString()}則)</span>`;
          }
          ratingHtml += `</span>`;
        }
        return `<div class="food-card">
          <div class="info">
            <div class="name">📸 ${s.name}${ratingHtml}${distBadge(s.lat, s.lng)}<span class="card-actions"><a class="glink" href="${link}" target="_blank">📍 導航</a>${uberLink(s.lat, s.lng, s.name)}</span></div>
            ${s.description?`<div class="desc">${s.description}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div class="area-group">
        <div class="area-header" onclick="toggleArea('${id}')">
          <span class="area-arrow" id="arrow-${id}">▼</span>
          <span class="area-title">📍 ${area}</span>
          <span class="area-count">${items.length} 個</span>
        </div>
        <div class="area-body" id="${id}">${cards}</div>
      </div>`;
    }).join('');
  }
  if(currentTab==='souvenirs'){
    if(!souvenirs.length) return '<p style="color:#999;padding:20px;">尚無伴手禮資料</p>';
    const groups = {};
    souvenirs.forEach(s=>{
      const area = s.area || '其他';
      if(!groups[area]) groups[area] = [];
      groups[area].push(s);
    });
    return Object.keys(groups).map(area=>{
      const items = groups[area];
      const id = 'souvenir-area-' + area.replace(/[^a-zA-Z0-9]/g,'');
      const cards = items.map(s=>{
        const link = gmapLink(s.name, currentCounty + ' ' + area);
        let ratingHtml = '';
        if(s.rating !== null && s.rating !== undefined){
          const stars = '★'.repeat(1);
          ratingHtml = `<span class="rating"><span class="stars">${stars}</span> ${s.rating}`;
          if(s.reviews !== null && s.reviews !== undefined){
            ratingHtml += ` <span class="reviews">(${s.reviews.toLocaleString()}則)</span>`;
          }
          ratingHtml += `</span>`;
        }
        return `<div class="food-card">
          <div class="info">
            <div class="name">🏪 ${s.name}${ratingHtml}${distBadge(s.lat, s.lng)}<span class="card-actions"><a class="glink" href="${link}" target="_blank">📍 導航</a>${uberLink(s.lat, s.lng, s.name)}</span></div>
            ${s.description?`<div class="desc">${s.description}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div class="area-group">
        <div class="area-header" onclick="toggleArea('${id}')">
          <span class="area-arrow" id="arrow-${id}">▼</span>
          <span class="area-title">🏪 ${area}</span>
          <span class="area-count">${items.length} 個</span>
        </div>
        <div class="area-body" id="${id}">${cards}</div>
      </div>`;
    }).join('');
  }
  if(currentTab==='nightmarkets'){
    const nms = (DATA.nightmarkets||[]).filter(m=>m.city===currentCounty);
    if(!nms.length) return '<p style="color:#999;padding:20px;">尚無資料</p>';
    // Type filter bar
    const types = [...new Set(nms.map(m=>m.type||'夜市'))];
    let typeBar = '<div class="food-cat-bar">';
    typeBar += `<button class="food-cat-btn nm-type-btn active" onclick="filterNMType(this,'')">全部 (${nms.length})</button>`;
    types.forEach(t=>{
      const count = nms.filter(m=>(m.type||'夜市')===t).length;
      const icon = t==='夜市'?'🌃':t==='老街'?'🏛️':t==='商圈'?'🛍️':'📍';
      typeBar += `<button class="food-cat-btn nm-type-btn" onclick="filterNMType(this,'${t}')">${icon} ${t} (${count})</button>`;
    });
    typeBar += '</div>';
    return typeBar + nms.map(m=>{
      const link = gmapLink(m.name, m.city+' '+m.district);
      const type = m.type||'夜市';
      const icon = type==='夜市'?'🌃':type==='老街'?'🏛️':type==='商圈'?'🛍️':'📍';
      const typeColor = type==='夜市'?'#7b1fa2':type==='老街'?'#5d4037':type==='商圈'?'#00695c':'#37474f';
      return `<div class="nm-card" data-nm-type="${type}" style="border-left-color:${typeColor}">
        <div class="nm-info">


          <div class="nm-name" style="color:${typeColor}">${icon} ${m.name}${distBadge(m.lat, m.lng)}<span class="card-actions"><a class="glink" href="${link}" target="_blank">📍 導航</a>${uberLink(m.lat, m.lng, m.name)}</span><span class="nm-days">${m.openDays}</span></div>
          <div class="nm-loc">📍 ${m.city}${m.district} · ${m.location||''}</div>
          ${m.description?`<div class="nm-desc">${m.description}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }
  return '';
}

// === 使用者定位 + 距離 ===
let userLocation = null; // {lat, lng}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371; // 地球半徑 km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180 / 180;
  const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getUserLocation() {
  if (!navigator.geolocation) { return; }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const banner = document.getElementById('geo-banner');
      if (banner) banner.classList.add('hide');
      render();
    },
    (err) => {
      const banner = document.getElementById('geo-banner');
      if (banner) banner.classList.add('hide');
      render();
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
  );
}

function distBadge(lat, lng) {
  if (!userLocation || lat == null || lng == null) return '';
  const d = haversine(userLocation.lat, userLocation.lng, lat, lng);
  let cls = d < 5 ? 'near' : d > 50 ? 'far' : '';
  return ` <span class="dist-badge ${cls}">📏 ${d.toFixed(1)}km</span>`;
}

function uberLink(lat, lng, name) {
  if (lat == null || lng == null) return '';
  const drop = JSON.stringify({latitude: lat, longitude: lng, addressLine1: name});
  const url = 'https://m.uber.com/looking?drop%5B0%5D=' + encodeURIComponent(drop) + '&pickup=my_location';
  return ' <a class="uber-link" href="' + url + '" target="_blank" title="叫 Uber">Uber</a>';
}

// 排序狀態
let sortMode = 'weighted'; // 'weighted' | 'distance'

function setSortMode(mode) {
  sortMode = mode;
  render();
}

function initApp(){
  // Don't call selectCounty here - loadCounty handles it
  ORDER.forEach(c=>{
    const badge = document.getElementById('badge-'+c);
    if(badge){
      badge.textContent = '...';
    }
  });
  // Pulse hint on load
  setTimeout(()=>{const h=document.getElementById('hamburger');if(h){h.classList.add('hint');setTimeout(()=>h.classList.remove('hint'),7000);}},1000);
  // Auto request location
  getUserLocation();
}
</script>

<div id="geo-banner" class="geo-banner"><span>📍 點「允許定位」即可顯示距離</span><button onclick="getUserLocation()">允許定位</button></div>
