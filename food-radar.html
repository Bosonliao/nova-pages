<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>美食雷達 - 星思旅食快搜神器</title>
<meta name="description" content="GPS 美食雷達，12 大分類，縣市+鄉鎮市區切換，距離+評價排序。">
<meta name="theme-color" content="#1D6F64">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon-32.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --teal:#2A9D8F;
  --teal-light:#A8DADC;
  --teal-dark:#1D6F64;
  --navy:#264653;
  --sand:#E9F5F4;
  --coral:#E76F51;
  --gray:#6B7B7E;
  --gray-light:#E8ECEC;
  --white:#fff;
  --shadow:0 2px 12px rgba(38,70,83,0.08);
  --shadow-hover:0 6px 24px rgba(38,70,83,0.15);
  --radius:14px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,var(--sand) 0%,#F7FBFB 300px);color:var(--navy);display:flex;flex-direction:column;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased;line-height:1.6;}

/* ===== Header (hero style) ===== */
.app-header{background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 60%,var(--teal-light) 100%);color:var(--white);padding:10px 14px;flex-shrink:0;z-index:100;box-shadow:0 2px 8px rgba(38,70,83,.12);display:flex;align-items:center;gap:8px;}
.app-header .logo{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35);flex-shrink:0;}
.app-header .title{font-size:17px;font-weight:700;letter-spacing:0.5px;line-height:1.1;}
.app-header .sub{font-size:9px;opacity:.7;font-weight:300;}
.app-header .city-btn{margin-left:auto;background:rgba(255,255,255,.15);color:var(--white);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px);}
.app-header .city-btn:active{background:rgba(255,255,255,.25);}
.app-header .back{color:var(--white);text-decoration:none;font-size:12px;opacity:.7;padding:5px 10px;border:1px solid rgba(255,255,255,.2);border-radius:16px;}

/* ===== Sidebar ===== */
.sidebar{position:fixed;top:0;left:0;height:100%;width:240px;background:linear-gradient(180deg,var(--teal-dark),var(--teal));color:var(--white);z-index:1001;transform:translateX(-100%);transition:transform .3s;overflow-y:auto;padding-top:52px;}
.sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.3);}
.sidebar .nav-section{padding:10px 18px 4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.5;}
.sidebar .nav-item{padding:12px 18px;cursor:pointer;font-size:16px;transition:background .2s;border-left:3px solid transparent;}
.sidebar .nav-item:hover{background:rgba(255,255,255,.1);}
.sidebar .nav-item.active{background:rgba(255,255,255,.15);border-left-color:#ffd54f;}
.sidebar .nav-item .badge{background:rgba(255,213,79,.9);color:var(--teal-dark);border-radius:10px;padding:1px 7px;font-size:12px;font-weight:600;margin-left:6px;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(38,70,83,.3);z-index:1000;display:none;}
.overlay.show{display:block;}

/* ===== Geo Banner ===== */
.geo-banner{background:linear-gradient(135deg,#457B9D,#1D6F64);color:var(--white);padding:6px 14px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;transition:all .3s;overflow:hidden;max-height:34px;}
.geo-banner.hide{max-height:0;padding:0;opacity:0;}
.geo-banner span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.geo-banner button{background:var(--white);color:var(--teal-dark);border:none;border-radius:12px;padding:3px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* ===== County + Area Bar ===== */
.city-area-bar{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--gray-light);box-shadow:var(--shadow);align-items:center;}
.city-area-bar .select-btn{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:var(--white);border:none;border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.city-area-bar .select-btn:active{transform:scale(0.96);}
.city-area-bar .select-btn.area{background:var(--white);color:var(--navy);border:2px solid var(--teal-light);}
.city-area-bar .select-btn.area.active{background:var(--teal);color:var(--white);border-color:var(--teal);}
.city-area-bar .area-scroll{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;}
.city-area-bar .area-scroll::-webkit-scrollbar{display:none;}
.city-area-bar .area-btn{border:1px solid var(--gray-light);border-radius:16px;padding:4px 10px;font-size:12px;background:var(--white);color:var(--navy);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;font-weight:500;}
.city-area-bar .area-btn:active{transform:scale(0.95);}
.city-area-bar .area-btn.active{background:var(--teal);color:var(--white);border-color:var(--teal);font-weight:600;}
.city-area-bar .area-btn .cnt{font-size:10px;opacity:.5;margin-left:2px;}

/* ===== Group View (vertical, top-to-bottom) ===== */
.group-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 10px;}

.group-section{margin-bottom:10px;}
.group-title{font-size:12px;font-weight:700;color:var(--teal-dark);text-transform:uppercase;letter-spacing:1px;padding:4px 4px 6px;opacity:.7;}
.group-list{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

.group-card{min-height:72px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border-left:4px solid var(--teal-light);padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
.group-card:active{transform:scale(0.95);box-shadow:var(--shadow-hover);}
.group-card .label{font-size:16px;font-weight:700;color:var(--navy);line-height:1.2;}
.group-card .near{font-size:11px;color:var(--teal-dark);font-weight:600;}

/* Group section accent colors */
.group-section[data-group="cuisine"] .group-card{border-left-color:#2A9D8F;}
.group-section[data-group="mealtype"] .group-card{border-left-color:#F4A261;}
.group-section[data-group="vibe"] .group-card{border-left-color:#9B5DE5;}
.group-section[data-group="award"] .group-card{border-left-color:#E63946;}

/* Per-category accent */
.group-card[data-cat="牛肉麵"]{border-left-color:#E76F51;}
.group-card[data-cat="麵類"]{border-left-color:#E76F51;}
.group-card[data-cat="飯類"]{border-left-color:#F4A261;}
.group-card[data-cat="餃子小籠"]{border-left-color:#E9C46A;}
.group-card[data-cat="鍋類"]{border-left-color:#E63946;}
.group-card[data-cat="日式"]{border-left-color:#457B9D;}
.group-card[data-cat="壽司"]{border-left-color:#457B9D;}
.group-card[data-cat="拉麵"]{border-left-color:#457B9D;}
.group-card[data-cat="燒肉"]{border-left-color:#E63946;}
.group-card[data-cat="居酒屋"]{border-left-color:#457B9D;}
.group-card[data-cat="串燒"]{border-left-color:#E76F51;}
.group-card[data-cat="牛排"]{border-left-color:#8B0000;}
.group-card[data-cat="韓式"]{border-left-color:#1565C0;}
.group-card[data-cat="泰式"]{border-left-color:#F4A261;}
.group-card[data-cat="義式"]{border-left-color:#4CAF50;}
.group-card[data-cat="港式"]{border-left-color:#7B1FA2;}
.group-card[data-cat="美式"]{border-left-color:#FF7043;}
.group-card[data-cat="熱炒"]{border-left-color:#E76F51;}
.group-card[data-cat="小吃"]{border-left-color:#FFB74D;}
.group-card[data-cat="素食"]{border-left-color:#66BB6A;}
.group-card[data-cat="輕食"]{border-left-color:#81C784;}
.group-card[data-cat="漢堡"]{border-left-color:#FF7043;}
.group-card[data-cat="早餐"]{border-left-color:#FFB74D;}
.group-card[data-cat="早午餐"]{border-left-color:#FFB74D;}
.group-card[data-cat="咖啡"]{border-left-color:#C8A87E;}
.group-card[data-cat="下午茶"]{border-left-color:#C8A87E;}
.group-card[data-cat="甜點"]{border-left-color:#F4A261;}
.group-card[data-cat="蛋糕"]{border-left-color:#F4A261;}
.group-card[data-cat="飲料店"]{border-left-color:#2A9D8F;}
.group-card[data-cat="冰品"]{border-left-color:#42A5F5;}
.group-card[data-cat="吃到飽"]{border-left-color:#AB47BC;}
.group-card[data-cat="合菜"]{border-left-color:#5C6BC0;}
.group-card[data-cat="餐酒館"]{border-left-color:#6A1B9A;}
.group-card[data-cat="酒吧"]{border-left-color:#5E35B1;}
.group-card[data-cat="精緻高級"]{border-left-color:#b71c1c;}
.group-card[data-cat="約會餐廳"]{border-left-color:#E91E63;}
.group-card[data-cat="寵物友善"]{border-left-color:#8D6E63;}
.group-card[data-cat="景觀餐廳"]{border-left-color:#26A69A;}
.group-card[data-cat="親子餐廳"]{border-left-color:#43A047;}
.group-card[data-cat="米其林推薦"]{border-left-color:#b71c1c;}
.group-card[data-cat="食尚玩家"]{border-left-color:#6a1b9a;}

/* ===== List View ===== */
.list-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;}

.list-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--white);border-bottom:2px solid var(--gray-light);flex-shrink:0;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(38,70,83,.06);}
.list-header .back-btn{font-size:20px;cursor:pointer;color:var(--teal-dark);flex-shrink:0;padding:4px 8px;}
.list-header .cat-icon{font-size:20px;}
.list-header .cat-name{font-size:16px;font-weight:700;color:var(--navy);}
.list-header .cat-count{font-size:11px;color:var(--gray);}
.list-header .sort-toggle{margin-left:auto;font-size:12px;color:var(--teal);cursor:pointer;padding:5px 12px;border:2px solid var(--teal-light);border-radius:20px;font-weight:600;background:var(--white);transition:all .2s;}
.list-header .sort-toggle:active{background:var(--sand);}

.list-stats{padding:6px 14px 4px;font-size:11px;color:var(--gray);text-align:center;flex-shrink:0;}
.list-stats .pos{color:var(--teal-dark);font-weight:600;}

/* List Card */
.card{background:var(--white);margin:0 12px 8px;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s;border-left:4px solid var(--teal-light);display:flex;flex-direction:column;gap:6px;}
.card:active{transform:translateY(-1px);box-shadow:var(--shadow-hover);}
.card .row1{display:flex;align-items:center;gap:6px;}
.card .name{font-weight:700;font-size:15px;color:var(--navy);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.35;}
.card .dist{font-size:12px;font-weight:700;color:#1565c0;background:#e3f2fd;border-radius:10px;padding:2px 8px;white-space:nowrap;flex-shrink:0;}
.card .dist.near{color:#2e7d32;background:#e8f5e9;}
.card .dist.far{color:var(--gray);background:var(--gray-light);}
.card .row2{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray);}
.card .county{background:var(--sand);color:var(--teal-dark);border-radius:6px;padding:1px 7px;font-size:10px;font-weight:600;}
.card .area{background:#f3e5f5;color:#7b1fa2;border-radius:6px;padding:1px 7px;font-size:10px;}
.card .rating .star{color:#E8A317;font-weight:700;}
.card .rating .rv{color:#aaa;font-size:10px;}
.card .nav{font-size:11px;color:var(--teal);text-decoration:none;white-space:nowrap;margin-left:auto;flex-shrink:0;padding:2px 8px;border:1px solid var(--teal);border-radius:11px;transition:color .2s;}
.card .nav:active{background:var(--sand);}
.card .uber{font-size:8px;font-weight:700;color:var(--white);background:#000;border-radius:4px;padding:1px 4px;text-decoration:none;margin-left:3px;}
.card .tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.card .tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;background:var(--sand);color:var(--teal-dark);}
.card .tag.pop{background:#ff6f00;color:var(--white);}
.card .tag.mstar{background:#b71c1c;color:var(--white);}
.card .tag.mbib{background:#ff6f00;color:var(--white);}
.card .tag.msel{background:#fff9c4;color:#b71c1c;border:1px solid #fbc02d;}
.card .desc{font-size:12px;color:var(--gray);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.see-more{text-align:center;padding:10px;margin:8px 12px;border-radius:var(--radius);background:var(--sand);color:var(--teal-dark);font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--teal-light);}
.see-more:active{background:var(--teal-light);}

/* ===== Loading ===== */
.loading{text-align:center;padding:50px 20px;color:var(--gray);}
.loading .spinner{width:36px;height:36px;border:3px solid var(--teal-light);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== No GPS ===== */
.no-gps{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.no-gps .icon{font-size:64px;margin-bottom:16px;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.no-gps h2{color:var(--teal-dark);font-size:20px;margin-bottom:8px;}
.no-gps p{color:var(--gray);font-size:14px;margin-bottom:20px;line-height:1.6;}
.no-gps button{padding:14px 40px;background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:var(--white);border:none;border-radius:28px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(42,157,143,.3);}
.no-gps button:active{transform:scale(0.96);}

/* ===== FAB ===== */
.fab{position:fixed;bottom:12px;right:12px;z-index:99;background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:var(--white);border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(38,70,83,.2);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.fab:active{transform:scale(0.9);}
.fab.hidden{display:none;}

.footer{text-align:center;padding:14px 12px 8px;font-size:10px;color:var(--gray);}
.footer a{color:var(--teal);text-decoration:none;}

@media(max-width:360px){
  .group-card{min-height:60px;padding:8px 10px;}
  .group-card .label{font-size:14px;}
  .group-card .near{font-size:10px;}
  .group-title{font-size:11px;padding:3px 4px 5px;}
  .app-header .title{font-size:15px;}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Header -->
<div class="app-header">
  <img src="miss-nova-logo.png" class="logo" alt="星思旅食">
  <div>
    <div class="title">📡 美食雷達</div>
    <div class="sub">37 屬性分類 · 30km 內快速決策 · V1.16</div>
  </div>
  <a href="taiwan-travel.html" class="back">主站</a>
</div>

<!-- Geo Banner -->

</div>

<!-- List View -->

    <span class="back-btn" onclick="showGrid()">←</span>

<button class="fab hidden" id="fab" onclick="locateMe()" title="重新定位">📍</button>

<script>
const CITY_EN = {"基隆":"keelung","台北":"taipei","新北":"newtaipei","宜蘭":"yilan","桃園":"taoyuan","新竹":"hsinchu","苗栗":"miaoli","台中":"taichung","南投":"nantou","彰化":"changhua","雲林":"yunlin","嘉義":"chiayi","台南":"tainan","高雄":"kaohsiung","屏東":"pingtung","花蓮":"hualien","台東":"taitung","澎湖":"penghu","金馬":"kinmen"};
const ORDER = Object.keys(CITY_EN);
const CITY_DISPLAY = {"基隆":"基隆市","台北":"台北市","新北":"新北市","宜蘭":"宜蘭縣","桃園":"桃園市","新竹":"新竹市","苗栗":"苗栗縣","台中":"台中市","南投":"南投縣","彰化":"彰化縣","雲林":"雲林縣","嘉義":"嘉義市","台南":"台南市","高雄":"高雄市","屏東":"屏東縣","花蓮":"花蓮縣","台東":"台東縣","澎湖":"澎湖縣","金馬":"金馬地區"};

const CITY_CENTER = {
  "基隆":{lat:25.1276,lng:121.7392},"台北":{lat:25.0330,lng:121.5654},"新北":{lat:25.0120,lng:121.4650},
  "宜蘭":{lat:24.7021,lng:121.7390},"桃園":{lat:24.9936,lng:121.3010},"新竹":{lat:24.8016,lng:120.9686},
  "苗栗":{lat:24.5600,lng:120.8210},"台中":{lat:24.1477,lng:120.6047},"南投":{lat:23.8388,lng:120.9870},
  "彰化":{lat:24.0883,lng:120.5410},"雲林":{lat:23.7277,lng:120.3897},"嘉義":{lat:23.4597,lng:120.2542},
  "台南":{lat:22.9908,lng:120.2133},"高雄":{lat:22.6273,lng:120.3014},"屏東":{lat:22.6692,lng:120.4879},
  "花蓮":{lat:23.9871,lng:121.6016},"台東":{lat:22.7583,lng:121.1444},"澎湖":{lat:23.5650,lng:119.6150},
  "金馬":{lat:24.4340,lng:118.3170}
};

const GROUPS = [
  {id:'cuisine', title:'料理風格', keys:['hotpot','japanese','sushi','ramen','yakiniku','korean','thai','italian','hk','american','izakaya','skewer','steak','beefnoodle','noodle','rice','dumpling','seafood','snack','vegetarian','lightmeal','burger']},
  {id:'mealtype', title:'餐點形態', keys:['breakfast','brunch','coffee','tea','dessert','cake','drink','ice']},
  {id:'vibe', title:'消費情境', keys:['buffet','group','bistro','bar','fine','date','pet','view','family']},
  {id:'award', title:'評價公信', keys:['michelin','sp']},
];

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function gmapLink(query, county) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query + ' ' + county + ' 台灣')}`;
}

function uberLink(lat, lng) {
  if (lat == null || lng == null) return '';
  const drop = JSON.stringify({latitude: lat, longitude: lng});
  return ` <a class="uber" href="https://m.uber.com/looking?drop%5B0%5D=${encodeURIComponent(drop)}&pickup=my_location" target="_blank">Uber</a>`;
}

function hasTag(f, t) {
  if (!f.tags) return false;
  if (Array.isArray(f.tags)) return f.tags.includes(t);
  return !!f.tags[t];
}

function isBreakfast(name) {
  return BREAKFAST_KEYWORDS.some(kw => name.includes(kw));
}

function nameMatchesKeywords(name, keywords) {
  if (!keywords) return false;
  return keywords.some(kw => name.includes(kw));
}

function detectNearestCounty(lat, lng) {
  let nearest = null, minDist = Infinity;
  for (const c of ORDER) {
    const center = CITY_CENTER[c];
    if (!center) continue;
    const d = haversine(lat, lng, center.lat, center.lng);
    if (d < minDist) { minDist = d; nearest = c; }
  }
  return nearest;
}

function detectNearestArea(lat, lng) {
  const food = getCountyFood(currentCounty);
  if (!food.length) return null;
  let nearest = null, minDist = Infinity;
  food.forEach(f => {
    if (f.lat != null && f.lng != null && f.area) {
      const d = haversine(lat, lng, f.lat, f.lng);
      if (d < minDist) { minDist = d; nearest = f.area; }
    }
  });
  return nearest;
}

function getCountyFood(city) {
  if (!allData[city]) return [];
  return allData[city].food || [];
}

function getAllFood() {
  let all = [];
  for (const c of ORDER) {
    if (allData[c] && allData[c].food) all = all.concat(allData[c].food);
  }
  return all;
}

function getFilteredFood() {
  let food = getCountyFood(currentCounty);
  if (currentArea) food = food.filter(f => f.area === currentArea);
  return food;
}

function getFoodByCategory(cat) {
  // When auto-located by GPS, search all food within 30km; when manually selected county, limit to that county
  let items = (autoLocated && userLocation) ? getAllFood() : getFilteredFood();
  // Michelin special case
  if (cat.isMichelin) {
    return items.filter(f => hasTag(f,'michelin-star') || hasTag(f,'michelin-bib') || hasTag(f,'michelin-selected'));
  }
  // Food Steppenwolf (食尚玩家) special case
  if (cat.isSP) {
    return items.filter(f => hasTag(f,'sp'));
  }
  let result = items;
  // Filter by tags OR keywords (multi-tag: a shop can match multiple categories)
  const hasTags = cat.tags && cat.tags.length;
  const hasKws = cat.keywords && cat.keywords.length;
  if (hasTags && hasKws) {
    // OR logic: match if either tags or keywords hit
    result = result.filter(f => {
      const fc = f.categories || [];
      const tagMatch = cat.tags.some(t => fc.includes(t));
      const kwMatch = nameMatchesKeywords(f.name || '', cat.keywords);
      return tagMatch || kwMatch;
    });
  } else if (hasTags) {
    result = result.filter(f => {
      const fc = f.categories || [];
      return cat.tags.some(t => fc.includes(t));
    });
  } else if (hasKws) {
    result = result.filter(f => nameMatchesKeywords(f.name || '', cat.keywords));
  }
  return result;
}

function countByCategory(cat) { return getFoodByCategory(cat).length; }

function nearestByCategory(cat) {
  const items = getFoodByCategory(cat);
  if (!items.length || !userLocation) return null;
  return items.reduce((min, f) => {
    if (f.lat == null) return min;
    const d = haversine(userLocation.lat, userLocation.lng, f.lat, f.lng);
    return (!min || d < min._dist) ? {...f, _dist: d} : min;
  }, null);
}

// ===== Area Bar (inside city-area-bar) =====
function renderAreaBar() {
  const food = getCountyFood(currentCounty);
  const areas = {};
  food.forEach(f => { if (f.area && f.area.trim()) areas[f.area] = (areas[f.area] || 0) + 1; });
  const areaList = Object.keys(areas).sort();
  let html = `<span class="area-btn ${!currentArea?'active':''}" onclick="selectArea('')">全區 <span class="cnt">${food.length}</span></span>`;
  areaList.forEach(a => {
    let displayA = a.replace(/[鄉鎮市]$/, '');
    if (displayA.length > 2 && displayA.endsWith('區')) displayA = displayA.slice(0, -1);
    if (a === '平鎮區') displayA = '平鎮';
    if (displayA.endsWith('平')) displayA = displayA + '鎮';
    html += `<span class="area-btn ${currentArea===a?'active':''}" onclick="selectArea('${a}')">${displayA} <span class="cnt">${areas[a]}</span></span>`;
  });
  document.getElementById('area-scroll').innerHTML = html;
  document.getElementById('city-area-bar').style.display = 'flex';
  document.getElementById('city-btn-top').textContent = CITY_DISPLAY[currentCounty] + ' ▾';
}

function selectArea(area) {
  currentArea = area;
  showCount = 20;
  renderAreaBar();
  if (document.getElementById('list-view').style.display === 'flex') renderList();
  else renderGrid();
}

// ===== Group View =====
function renderGrid() {
  let html = '';
  GROUPS.forEach(group => {
    const cats = group.keys.map(k => CATEGORIES.find(c => c.key === k)).filter(Boolean);
    html += `<div class="group-section" data-group="${group.id}">`;
    html += `<div class="group-title">${group.title}</div>`;
    html += `<div class="group-list">`;
    cats.forEach(cat => {
      const count = countByCategory(cat);
      const nearest = nearestByCategory(cat);
      let nearText = '';
      if (nearest && userLocation) {
        nearText = nearest._dist < 1 ? `最近 ${(nearest._dist * 1000).toFixed(0)}m` : `最近 ${nearest._dist.toFixed(1)}km`;
      }
      html += `<div class="group-card" data-cat="${cat.label}" onclick="openCategory('${cat.key}')">`;
      html += `<span class="label">${cat.label}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('grid-view').innerHTML = html;
}

const MAX_DIST_KM = 30;
function renderList() {
  let items = getFoodByCategory(currentCat).map(f => {
    if (f.lat == null || !userLocation) return {...f, _dist: 0};
    return {...f, _dist: haversine(userLocation.lat, userLocation.lng, f.lat, f.lng)};
  });
  // Filter to 30km only when auto-located by GPS (not when manually selecting county)
  if (autoLocated && userLocation) {
    items = items.filter(f => f._dist <= MAX_DIST_KM);
  }
  if (sortMode === 'dist') {
    items.sort((a, b) => a._dist - b._dist);
  } else {
    items.sort((a, b) => {
      const rDiff = (b.rating || 0) - (a.rating || 0);
      if (Math.abs(rDiff) > 0.01) return rDiff;
      return a._dist - b._dist;
    });
  }
  document.getElementById('list-cat-count').textContent = `(${items.length} 家)`;
  let statsHtml = `📍 <span class="pos">${userLocation ? userLocation.lat.toFixed(4) + ', ' + userLocation.lng.toFixed(4) : '--'}</span>`;
  statsHtml += ` · ${CITY_DISPLAY[currentCounty]}${currentArea ? ' ' + currentArea : ' 全區'}`;
  statsHtml += ` · 依${sortMode === 'dist' ? '距離' : '評分'}排序`;
  if (autoLocated && userLocation) statsHtml += ` · 📏30km內`;
  document.getElementById('list-stats').innerHTML = statsHtml;
  if (!items.length) {
    const emptyMsg = (autoLocated && userLocation) ? '30km 內找不到此分類的美食，試試切換縣市或區域' : '此區域找不到此分類的美食';
    document.getElementById('list-content').innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray);font-size:13px;">' + emptyMsg + '</div>';
    return;
  }
  let html = '';
  const visible = items.slice(0, showCount);
  visible.forEach(f => {
    let ratingHtml = '';
    if (f.rating != null && f.rating > 0) {
      ratingHtml = `<span class="rating"><span class="star">★${f.rating}</span> <span class="rv">(${(f.reviews||0).toLocaleString()})</span></span>`;
    }
    const distText = f._dist < 1 ? `${(f._dist * 1000).toFixed(0)}m` : `${f._dist.toFixed(1)}km`;
    const distCls = f._dist < 3 ? 'near' : f._dist > 20 ? 'far' : '';
    const tags = [];
    if (hasTag(f, 'michelin-star')) tags.push('<span class="tag mstar">米其林</span>');
    else if (hasTag(f, 'michelin-bib')) tags.push('<span class="tag mbib">必比登</span>');
    else if (hasTag(f, 'michelin-selected')) tags.push('<span class="tag msel">入選</span>');
    if (f.rating >= 4.0 && f.reviews >= 1000) tags.push('<span class="tag pop">人氣</span>');
    if (hasTag(f, 'sp')) tags.push('<span class="tag" style="background:#f3e5f5;color:#7b1fa2;">食尚</span>');
    (f.categories || []).slice(0, 2).forEach(c => tags.push(`<span class="tag">${c}</span>`));
    html += `<div class="card">
      <div class="row1">
        <span class="name">${f.name}</span>
        <span class="dist ${distCls}">${distText}</span>
      </div>
      <div class="row2">
        <span class="county">${currentCounty}</span>
        ${f.area ? `<span class="area">${f.area}</span>` : ''}
        ${ratingHtml}
        <a class="nav" href="${gmapLink(f.name, currentCounty + (f.area?' '+f.area:''))}" target="_blank">📍導航</a>
        ${uberLink(f.lat, f.lng)}
      </div>
      ${tags.length ? `<div class="tags">${tags.join('')}</div>` : ''}
      ${(f.description && !/^Google \d+/.test(f.description)) ? `<div class="desc">${f.description}</div>` : ''}
    </div>`;
  });
  if (items.length > showCount) {
    html += `<div class="see-more" onclick="showMoreList()">再顯示 20 筆 ▼ (共 ${items.length} 家)</div>`;
  }
  html += `<div class="footer">📡 美食雷達 V1.16 · <a href="taiwan-travel.html">主站</a> · <a href="nearby.html">附近推薦</a><br>更新於 2026-07-19</div>`;
  document.getElementById('list-content').innerHTML = html;
}

function showMoreList() { showCount += 20; renderList(); }

// ===== Load data =====
async function loadAllData() {
  if (dataLoaded) return;
  const batchSize = 5;
  for (let i = 0; i < ORDER.length; i += batchSize) {
    const batch = ORDER.slice(i, i + batchSize);
    await Promise.all(batch.map(async (city) => {
      const en = CITY_EN[city];
      try {
        const resp = await fetch(`data/${en}.json`);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        allData[city] = await resp.json();
      } catch(e) {
        allData[city] = { food: [], routes: [], spots: [], souvenirs: [] };
      }
    }));
  }
  dataLoaded = true;
}

// ===== GPS =====
function showGeoBanner(text, showLocate) {
  const banner = document.getElementById('geo-banner');
  banner.classList.remove('hide');
  let html = '<span>' + text + '</span>';
  if (showLocate) html += '<button onclick="locateMe()">允許定位</button>';
  else html += '<button onclick="document.getElementById(\'geo-banner\').classList.add(\'hide\')">✕</button>';
  banner.innerHTML = html;
}

function locateMe() {
  if (!navigator.geolocation) { showGeoBanner('⚠️ 裝置不支援定位', false); return; }
  showGeoBanner('📡 雷達啟動中... 載入全台資料...', false);
  document.getElementById('no-gps-prompt').style.display = 'none';
  document.getElementById('fab').classList.add('hidden');
  const dataPromise = loadAllData();
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      showGeoBanner('✅ 定位成功！偵測所在縣市...', false);
      await dataPromise;
      const detected = detectNearestCounty(userLocation.lat, userLocation.lng);
      if (detected) {
        currentCounty = detected;
        autoLocated = true;
        document.getElementById('city-btn-top').textContent = CITY_DISPLAY[detected] + ' ▾';
      }
      const detectedArea = detectNearestArea(userLocation.lat, userLocation.lng);
      if (detectedArea) currentArea = detectedArea;
      renderSidebar();
      renderAreaBar();
      renderGrid();
      document.getElementById('grid-view').style.display = 'block';
      document.getElementById('fab').classList.remove('hidden');
      showGeoBanner(`✅ 已切換到 ${CITY_DISPLAY[currentCounty]}${detectedArea ? ' ' + detectedArea : ''}`, false);
      setTimeout(() => document.getElementById('geo-banner').classList.add('hide'), 3000);
    },
    (err) => {
      let msg = '⚠️ 定位失敗，請重試';
      if (err.code === 1) msg = '⚠️ 已拒絕定位，請至設定允許';
      else if (err.code === 3) msg = '⚠️ 定位逾時，請重試';
      showGeoBanner(msg, true);
      document.getElementById('no-gps-prompt').style.display = 'flex';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 300000 }
  );
}

window.addEventListener('load', () => {
  showGeoBanner('📍 點「允許定位」自動偵測所在縣市', true);
});
</script>
